name: assign_album moves sub-album and updates album tree parentAlbumId and dirPath
# Verifies that after moving a sub-album, GET /get/get-albums returns the
# album with updated parentAlbumId (pointing to the target) and dirPath
# reflecting the new filesystem location.
given:
  - dir_album: /e2e_zza/source/child
    id_as: $child_album
  - photo: /e2e_zza/source/child/photo.jpg
    id_as: $photo
  - dir_album: /e2e_zza/target
    id_as: $target_album

when:
  - call: PUT /put/assign_album
    body:
      hash: "${child_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
  - call: GET /get/get-albums

then:
  - response.status: 200
  # File physically moved to the new location
  - file_exists: /e2e_zza/target/child/photo.jpg
  - file_absent: /e2e_zza/source/child/photo.jpg
  # The child album's parentAlbumId points to the target album
  - array_where:
      where:
        dirPath: e2e_zza/target/child
      assert:
        parentAlbumId: "${target_album}"
