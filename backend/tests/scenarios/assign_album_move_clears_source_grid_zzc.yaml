name: assign_album move removes child from source album's get-data grid
# Regression: after moving a sub-album, the source album's entity grid (fetched
# via prefetch + get-data) must no longer include the moved child. This simulates
# the user viewing the source album, moving a sub-album, and the grid refreshing.
given:
  - dir_album: /e2e_zzc/source/child
    id_as: $child_album
  - photo: /e2e_zzc/source/child/photo.jpg
    id_as: $photo
  - photo: /e2e_zzc/source/photo_in_source.jpg
    id_as: $source_photo
  - dir_album: /e2e_zzc/target
    id_as: $target_album
  - dir_album: /e2e_zzc/source
    id_as: $source_album

when:
  - call: PUT /put/assign_album
    body:
      hash: "${child_album}"
      albumId: "${target_album}"
    then:
      - response.status: 200
  - call: POST /get/prefetch
    # Filter for items that are direct children of source_album
    body: { ParentAlbum: "${source_album}" }
    capture:
      token: response.token
      ts: response.prefetch.timestamp
      end: response.prefetch.dataLength
  - call: GET /get/get-data?timestamp=${ts}&start=0&end=${end}
    auth: false
    headers:
      Authorization: "Bearer ${token}"

then:
  - response.status: 200
  # Source album's entity grid should no longer have an entry for the moved child.
  # The ParentAlbum filter only returns album-type items whose parentAlbumId
  # matches source_album. After the move, the child's parent is target, so it
  # should be absent from this filtered list.
  - array_where:
      where:
        abstractData.albumId: "${child_album}"
      expect: absent
