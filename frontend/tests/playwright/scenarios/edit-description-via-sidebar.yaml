name: Editing description in sidebar persists after leaving and re-entering the view
covers:
  api:
    - PUT /put/set_user_defined_description
  ui:
    - description textarea accepts input
    - description persists after leaving and re-entering the item view
    - description written to XMP sidecar

given:
  - dir_album: descedit/pool

  - photo: descedit/pool/img01.jpg

steps:
  - when:
      - navigate: /albums
    assert:
      - ui.visible: main/

  - when:
      - click.text: descedit
    assert:
      - ui.visible: main/

  - when:
      - click.text: pool
    assert:
      - ui.visible: main/

  - when:
      - click.first: true
    assert:
      # The info panel is always visible in the item view now.
      - ui.visible: main/

  # Fill the description textarea (uniquely identified by aria-label)
  - when:
      - fill: textbox/Description
        value: A scenic landscape photo
    assert:
      - ui.input_value: textbox/Description
        contains: A scenic landscape photo

  # Close now leaves the item view entirely (like the back button) — blurring
  # the textarea on the way out still triggers the API save and a toast.
  - when:
      - click.icon: mdi-close
    assert:
      - ui.toast:
          type: success
          contains: Description saved

  # Sidecar must have been written with the description
  - when:
      - wait.ms: 200
    assert:
      - file.contains: descedit/pool/img01.xmp
        text: A scenic landscape photo

  # Re-enter the photo and verify the description was persisted server-side
  - when:
      - click.first: true
    assert:
      - ui.input_value: textbox/Description
        contains: A scenic landscape photo
