name: Assigning a photo to an album via the sidebar modal moves it correctly
covers:
  api:
    - PUT /put/assign_album
  ui:
    - AssignAlbumModal selects album and confirms move
    - sidebar album chip reflects new album after move

given:
  - dir_album: assigntest/imports

  - dir_album: assigntest/destination
    id_as: $dest

  - photo: assigntest/imports/photo.jpg
    id_as: $photo

steps:
  # Navigate through albums so the data store is populated before we enter the photo view
  - when:
      - navigate: /albums
    assert:
      - ui.visible: main/

  - when:
      - click.text: assigntest
    assert:
      - ui.visible: main/

  - when:
      - click.text: imports
    assert:
      - ui.visible: main/

  - when:
      - click.first: true
    assert:
      - ui.visible: main/

  # The info sidepane (and its menu) is opt-in now — open it via the
  # modal's info icon before reaching the three-dot menu.
  - when:
      - click.icon: mdi-information-outline
    assert:
      - ui.visible: main/

  # Open three-dot menu and launch Assign Album modal
  - when:
      - click.testid: photo-menu
    assert:
      - ui.visible: main/

  - when:
      - click: option/Assign Album
    assert:
      - ui.modal: open

  # Select the destination album in the tree and confirm
  - when:
      - click: option/Destination
      - click: button/Move
    assert:
      - ui.toast:
          type: success
          contains: Moved to album
      - ui.sidebar_visible: Destination
