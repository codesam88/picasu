[graph]
targets = []

[advisories]
version = 2
ignore = [
    # quick-xml <0.41.0 has quadratic attribute checking and unbounded namespace
    # allocation. Both require crafted XML with many attributes/declarations on a
    # single tag. quick-xml is only pulled in via little_exif -> snapfab, which is
    # a dev-dependency used for test fixtures — the vulnerable code paths are not
    # reachable with untrusted input. little_exif 0.6.23 (latest) pins
    # quick-xml ^0.37.5; no upgrade path exists upstream yet.
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "ISC",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "MPL-2.0",
    "Unicode-3.0",
    "Zlib",
    "CC0-1.0",
    "NCSA",
    "CDLA-Permissive-2.0", # webpki-roots (TLS root certificates), via ureq v3
]

[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "allow"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
